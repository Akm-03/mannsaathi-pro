version: '3.8'

services:
  mannsaathi-api:
    build: .
    container_name: mannsaathi-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_PATH=/app/data/mannsaathi.db
      - UPLOAD_FOLDER=/app/uploads
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mannsaathi-network

  # Optional: Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: mannsaathi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mannsaathi-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: mannsaathi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - mannsaathi-api
    restart: unless-stopped
    networks:
      - mannsaathi-network

volumes:
  redis-data:

networks:
  mannsaathi-network:
    driver: bridge
